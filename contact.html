<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Abdul Samad - Get in touch for collaborations or inquiries.">
  <title>Contact Me | Abdul Samad</title>
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
  <!-- Navigation -->
  <nav class="navbar">
    <h1>Abdul's Portfolio</h1>
    <ul class="nav-list">
      <li>
        <a href="index.html">
          <i class="fa-solid fa-house"></i>
          <span>Home</span>
        </a>
      </li>
      <li>
        <a href="about.html">
          <i class="fa-solid fa-user"></i>
          <span>About Me</span>
        </a>
      </li>
      <li>
        <a href="projects.html">
          <i class="fa-solid fa-tv"></i>
          <span>Projects</span>
        </a>
      </li>
      <li>
        <a href="contact.html">
          <i class="fa-brands fa-facebook-messenger"></i>
          <span>Contact</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Contact Form Section -->
  <section class="contact-section">
    <h1 class="contact-heading">Get in Touch ✨</h1>
    <p class="contact-subtext">Feel free to reach out by filling this form below.</p>

    <form class="contact-form">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="Enter subject" required>
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">
        <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i>
        Send Message
      </button>
    </form>
  </section>

  <script src="https://kit.fontawesome.com/7b403c5ea4.js" crossorigin="anonymous"></script>

  <!-- Navbar scroll effect -->
  <script>
    window.addEventListener('scroll', function () {
      const navbar = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });
  </script>
</body>

</html>
